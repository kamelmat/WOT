server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./.data/wot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true

wot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  upload-dir: ${WOT_UPLOAD_DIR:./uploads}


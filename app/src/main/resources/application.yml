server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: wot-fit-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wot}
    username: ${DB_USER:wot}
    password: ${DB_PASSWORD:wot}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

wot:
  capability: fit
  api:
    base-path: /api/v1/fit
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  upload-dir: ${WOT_UPLOAD_DIR:./uploads}
  jwt:
    secret: ${WOT_JWT_SECRET:dev-only-change-me-in-production-min-32-chars!!}
    expiry-hours: ${WOT_JWT_EXPIRY_HOURS:168}


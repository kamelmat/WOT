server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

wot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload-dir: ${WOT_UPLOAD_DIR:/tmp/wot-uploads}
  jwt:
    secret: ${WOT_JWT_SECRET}
    expiry-hours: ${WOT_JWT_EXPIRY_HOURS:168}

spring:
  datasource:
    url: jdbc:h2:mem:wot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

wot:
  jwt:
    secret: test-jwt-secret-at-least-32-characters-long
    expiry-hours: 24


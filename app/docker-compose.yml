services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wot
      POSTGRES_USER: wot
      POSTGRES_PASSWORD: wot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wot -d wot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - wot_pg_data:/var/lib/postgresql/data

  fit-service:
    build:
      context: .
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/wot
      DB_USER: wot
      DB_PASSWORD: wot
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  wot_pg_data:


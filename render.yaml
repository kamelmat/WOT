# Render blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wot-api
    runtime: docker
    rootDir: app
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: WOT_UPLOAD_DIR
        value: /tmp/wot-uploads
      - key: WOT_JWT_EXPIRY_HOURS
        value: "168"
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: WOT_JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
